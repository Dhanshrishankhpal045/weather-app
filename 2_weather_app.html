<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: #0f172a;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
      transition: background 0.8s ease;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 2.5rem;
      width: 100%; max-width: 420px;
      color: #e2e8f0;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; font-weight: 800;
      letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 1.5rem;
    }

    .search-row {
      display: flex; gap: 0.6rem; margin-bottom: 2rem;
    }
    .search-row input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #e2e8f0; font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    .search-row input::placeholder { color: rgba(255,255,255,0.3); }
    .search-row input:focus { border-color: rgba(255,255,255,0.4); }
    .search-row button {
      padding: 0.85rem 1.3rem;
      background: #38bdf8;
      border: none; border-radius: 12px;
      color: #0f172a; font-size: 1.1rem;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
      font-weight: 600;
    }
    .search-row button:hover { background: #7dd3fc; transform: scale(1.05); }

    /* WEATHER DISPLAY */
    #weather { display: none; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .weather-icon { font-size: 6rem; text-align: center; line-height: 1; margin-bottom: 0.5rem; }

    .city-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem; font-weight: 800;
      text-align: center; margin-bottom: 0.2rem;
    }
    .date-text {
      text-align: center; color: rgba(255,255,255,0.4);
      font-size: 0.85rem; margin-bottom: 1.5rem;
    }
    .temp-big {
      font-family: 'Syne', sans-serif;
      font-size: 5rem; font-weight: 800;
      text-align: center; line-height: 1;
    }
    .condition {
      text-align: center; color: #38bdf8;
      font-size: 1rem; letter-spacing: 2px;
      text-transform: uppercase; margin: 0.5rem 0 2rem;
    }

    .stats {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 0.8rem;
    }
    .stat {
      background: rgba(255,255,255,0.06);
      border-radius: 14px; padding: 1rem 0.5rem;
      text-align: center;
    }
    .stat-icon { font-size: 1.4rem; margin-bottom: 0.3rem; }
    .stat-val { font-size: 1.1rem; font-weight: 600; }
    .stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }

    /* ERROR */
    #error {
      display: none; text-align: center;
      color: #f87171; padding: 1rem; font-size: 0.9rem;
    }

    /* LOADING */
    #loading { display: none; text-align: center; padding: 1rem; color: rgba(255,255,255,0.4); }

    .demo-note {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 12px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
    }
    .demo-note strong { color: #38bdf8; }
  </style>
</head>
<body>

<div class="card">
  <div class="title">☁ Weather App</div>

  <div class="search-row">
    <input type="text" id="cityInput" placeholder="Enter city name..." onkeydown="if(event.key==='Enter') getWeather()"/>
    <button onclick="getWeather()">🔍</button>
  </div>

  <div id="loading">Loading...</div>
  <div id="error"></div>

  <div id="weather">
    <div class="weather-icon" id="wIcon">🌤️</div>
    <div class="city-name" id="wCity">Mumbai</div>
    <div class="date-text" id="wDate"></div>
    <div class="temp-big" id="wTemp">28°C</div>
    <div class="condition" id="wCondition">Partly Cloudy</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-icon">💧</div>
        <div class="stat-val" id="wHumidity">72%</div>
        <div class="stat-label">Humidity</div>
      </div>
      <div class="stat">
        <div class="stat-icon">💨</div>
        <div class="stat-val" id="wWind">14 km/h</div>
        <div class="stat-label">Wind</div>
      </div>
      <div class="stat">
        <div class="stat-icon">👁️</div>
        <div class="stat-val" id="wFeel">26°C</div>
        <div class="stat-label">Feels Like</div>
      </div>
    </div>
  </div>

  <div class="demo-note">
    <strong>🔑 To make this work with real data:</strong><br/>
    1. Go to <strong>openweathermap.org</strong> → sign up free<br/>
    2. Copy your API key<br/>
    3. Replace <code>YOUR_API_KEY</code> in the JS below<br/>
    For now, try: <strong>Mumbai, London, Tokyo, New York</strong>
  </div>
</div>

<script>
  // =====================================================
  // STEP 1: Get your FREE API key from openweathermap.org
  // STEP 2: Replace YOUR_API_KEY below with your actual key
  // =====================================================
  const API_KEY = "YOUR_API_KEY";

  // Demo data when no API key set
  const demoData = {
    "mumbai":    { temp: 31, feels: 34, condition: "Humid & Hazy",    humidity: 82, wind: 18, icon: "🌫️", bg: "#1a1a2e" },
    "london":    { temp: 14, feels: 11, condition: "Overcast Clouds", humidity: 78, wind: 22, icon: "☁️", bg: "#1e293b" },
    "tokyo":     { temp: 22, feels: 21, condition: "Clear Sky",       humidity: 55, wind: 10, icon: "☀️", bg: "#1c1f2e" },
    "new york":  { temp: 18, feels: 16, condition: "Light Rain",      humidity: 88, wind: 28, icon: "🌧️", bg: "#0f1a2e" },
    "delhi":     { temp: 38, feels: 42, condition: "Sunny & Hot",     humidity: 30, wind: 8,  icon: "🔆", bg: "#2d1a0e" },
    "paris":     { temp: 17, feels: 15, condition: "Partly Cloudy",   humidity: 65, wind: 15, icon: "⛅", bg: "#1a2030" },
  };

  function getWeather() {
    const city = document.getElementById('cityInput').value.trim();
    if (!city) { showError("Please enter a city name!"); return; }

    document.getElementById('error').style.display = 'none';
    document.getElementById('weather').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    if (API_KEY === "YOUR_API_KEY") {
      // Use demo data
      setTimeout(() => {
        const key = city.toLowerCase();
        if (demoData[key]) {
          displayWeather(city, demoData[key]);
        } else {
          // Generate plausible random data for unknown cities
          const icons = ["☀️","⛅","🌦️","🌧️","🌤️"];
          const conditions = ["Clear Sky","Partly Cloudy","Light Rain","Overcast","Sunny"];
          const idx = Math.floor(Math.random() * icons.length);
          displayWeather(city, {
            temp: Math.round(15 + Math.random() * 20),
            feels: Math.round(13 + Math.random() * 20),
            condition: conditions[idx],
            humidity: Math.round(40 + Math.random() * 50),
            wind: Math.round(5 + Math.random() * 30),
            icon: icons[idx],
            bg: "#0f172a"
          });
        }
      }, 800);
      return;
    }

    // REAL API CALL (when you have your API key)
    const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;
    fetch(url)
      .then(res => res.json())
      .then(data => {
        if (data.cod !== 200) { showError("City not found! Check spelling."); return; }
        const iconMap = { "01":"☀️","02":"⛅","03":"☁️","04":"☁️","09":"🌧️","10":"🌦️","11":"⛈️","13":"❄️","50":"🌫️" };
        const iconCode = data.weather[0].icon.slice(0,2);
        displayWeather(data.name, {
          temp: Math.round(data.main.temp),
          feels: Math.round(data.main.feels_like),
          condition: data.weather[0].description,
          humidity: data.main.humidity,
          wind: Math.round(data.wind.speed * 3.6),
          icon: iconMap[iconCode] || "🌡️",
          bg: "#0f172a"
        });
      })
      .catch(() => showError("Something went wrong. Try again."));
  }

  function displayWeather(city, d) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('wIcon').textContent = d.icon;
    document.getElementById('wCity').textContent = capitalize(city);
    document.getElementById('wDate').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    document.getElementById('wTemp').textContent = d.temp + "°C";
    document.getElementById('wCondition').textContent = d.condition;
    document.getElementById('wHumidity').textContent = d.humidity + "%";
    document.getElementById('wWind').textContent = d.wind + " km/h";
    document.getElementById('wFeel').textContent = d.feels + "°C";
    document.getElementById('weather').style.display = 'block';
    document.body.style.background = d.bg;
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.textContent = "⚠️ " + msg;
    el.style.display = 'block';
  }

  function capitalize(s) { return s.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); }

  // Load Mumbai as default on start
  window.onload = () => {
    document.getElementById('cityInput').value = "Mumbai";
    getWeather();
  };
</script>

</body>
</html>
